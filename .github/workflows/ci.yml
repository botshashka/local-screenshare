name: CI

# Lint + both test suites on PRs and feature-branch pushes. No secrets, so it runs
# on forks. (main is gated by deploy.yml, which runs the same checks before shipping.)
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Root and worker/ are separate pnpm workspaces.
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --frozen-lockfile
        working-directory: worker

      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test
        working-directory: worker
