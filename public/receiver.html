<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screenshare Receiver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }

  /* ── Layout container ── */
  #stage {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .slot {
    position: absolute;
    background: #111;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .slot video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Hide native video placeholder when no source */
  .slot.disconnected video { visibility: hidden; }

  /* ── Empty state overlay ── */
  .slot .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #555;
    font-size: 0.9rem;
    pointer-events: none;
  }
  .slot.connected .overlay { display: none; }
  .slot.disconnected .overlay { display: flex; }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%       { opacity: 0.6;  transform: scale(1.08); }
  }
  .slot .overlay .ring {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #444;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── Layout: side-by-side ── */
  body.side-by-side #slotA { top: 0; left: 0; width: 50%; height: 100%; border-right: 2px solid #000; }
  body.side-by-side #slotB { top: 0; left: 50%; width: 50%; height: 100%; }

  /* ── Layout: pip-a (A big, B small) ── */
  body.pip-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.pip-a #slotB { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }

  /* ── Layout: pip-b (B big, A small) ── */
  body.pip-b #slotA { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }
  body.pip-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Layout: solo-a ── */
  body.solo-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.solo-a #slotB { display: none; }

  /* ── Layout: solo-b ── */
  body.solo-b #slotA { display: none; }
  body.solo-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Controls bar ── */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    gap: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #controls:focus-within,
  body:not(.idle) #controls { opacity: 1; }

  #layoutBtn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    outline: 2px solid transparent;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #layoutBtn:focus { outline-color: #60a5fa; }
  #layoutBtn:hover { background: rgba(255,255,255,0.2); }
  #layoutBtn .dots { display: flex; gap: 4px; align-items: center; }
  #layoutBtn .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.2s;
  }
  #layoutBtn .dots span.active { background: rgba(255,255,255,0.85); }

  /* ── Hint ── */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 200;
    white-space: nowrap;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>

<div id="stage">
  <div class="slot disconnected" id="slotA">
    <video id="videoA" autoplay playsinline></video>
    <div class="overlay">
      <div class="ring"></div>
      <span>Waiting for Device A…</span>
    </div>
  </div>
  <div class="slot disconnected" id="slotB">
    <video id="videoB" autoplay playsinline></video>
    <div class="overlay">
      <div class="ring"></div>
      <span>Waiting for Device B…</span>
    </div>
  </div>
</div>

<div id="controls">
  <button id="layoutBtn" autofocus>
    <span id="layoutLabel">Side by Side</span>
    <span class="dots" id="layoutDots"></span>
  </button>
</div>
<div id="hint">Press L, Space, or Blue button to switch layout</div>

<script type="module" src="/js/receiver.js"></script>
</body>
</html>
