<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screenshare Receiver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* TV-remote color palette, reused for the legend and per-device accents */
  :root {
    --c-red: #e5484d;
    --c-green: #30a46c;
    --c-yellow: #f5d90a;
    --c-blue: #60a5fa;
  }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }

  /* ── Layout container ── */
  #stage {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .slot {
    position: absolute;
    background: #111;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  /* Per-device accent (matches its remote button), used by the side-by-side name tag */
  #slotA { --accent: var(--c-red); }
  #slotB { --accent: var(--c-green); }

  .slot video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Hide native video placeholder when no source */
  .slot.disconnected video { visibility: hidden; }

  /* ── Empty state overlay ── */
  .slot .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #555;
    font-size: 0.9rem;
    pointer-events: none;
  }
  .slot.connected .overlay { display: none; }
  .slot.disconnected .overlay { display: flex; }

  /* ── Per-device name tag (shown under each pane in side-by-side) ── */
  .slot .tag {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.85);
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 5;
  }
  .slot .tag .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex: none; }
  body.side-by-side .slot.connected .tag { display: flex; }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%       { opacity: 0.6;  transform: scale(1.08); }
  }
  .slot .overlay .ring {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #444;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── Layout: side-by-side ── */
  body.side-by-side #slotA { top: 0; left: 0; width: 50%; height: 100%; border-right: 2px solid #000; }
  body.side-by-side #slotB { top: 0; left: 50%; width: 50%; height: 100%; }

  /* ── Layout: pip-a (A big, B small) ── */
  body.pip-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.pip-a #slotB { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }

  /* ── Layout: pip-b (B big, A small) ── */
  body.pip-b #slotA { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }
  body.pip-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Layout: solo-a ── */
  body.solo-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.solo-a #slotB { display: none; }

  /* ── Layout: solo-b ── */
  body.solo-b #slotA { display: none; }
  body.solo-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Controls bar ── */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    gap: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  /* Visibility is driven solely by the idle timer — not by focus, or the bar
     would stay pinned open whenever the layout button holds focus (e.g. after a
     TV remote color-button press) and never auto-hide. */
  body:not(.idle) #controls { opacity: 1; }

  #layoutBtn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    outline: 2px solid transparent;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #layoutBtn:focus { outline-color: #60a5fa; }
  #layoutBtn:hover { background: rgba(255,255,255,0.2); }
  #layoutBtn .dots { display: flex; gap: 4px; align-items: center; }
  #layoutBtn .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.2s;
  }
  #layoutBtn .dots span.active { background: rgba(255,255,255,0.85); }

  /* ── Hint ── */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 200;
    white-space: nowrap;
  }
  #hint.show { opacity: 1; }

  /* ── Color-key legend (shown on a TV color-button press) ── */
  #legend {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    display: flex;
    gap: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 200;
  }
  #legend.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #legend .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.06);
    white-space: nowrap;
    transition: color 0.2s, background 0.2s, opacity 0.2s;
  }
  #legend .pill .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  #legend .pill[data-color="red"] .dot { background: var(--c-red); }
  #legend .pill[data-color="green"] .dot { background: var(--c-green); }
  #legend .pill[data-color="yellow"] .dot { background: var(--c-yellow); }
  #legend .pill[data-color="blue"] .dot { background: var(--c-blue); }
  #legend .pill.active { color: #fff; background: rgba(255,255,255,0.18); }
  #legend .pill.dim { opacity: 0.4; }
</style>
</head>
<body>

<div id="stage">
  <div class="slot disconnected" id="slotA">
    <video id="videoA" autoplay playsinline></video>
    <div class="overlay">
      <div class="ring"></div>
      <span>Waiting for Device A…</span>
    </div>
    <div class="tag"><span class="dot"></span>Device A</div>
  </div>
  <div class="slot disconnected" id="slotB">
    <video id="videoB" autoplay playsinline></video>
    <div class="overlay">
      <div class="ring"></div>
      <span>Waiting for Device B…</span>
    </div>
    <div class="tag"><span class="dot"></span>Device B</div>
  </div>
</div>

<div id="controls">
  <button id="layoutBtn">
    <span id="layoutLabel">Side by Side</span>
    <span class="dots" id="layoutDots"></span>
  </button>
</div>
<div id="legend">
  <span class="pill" data-color="red"><span class="dot"></span>Device A</span>
  <span class="pill" data-color="green"><span class="dot"></span>Device B</span>
  <span class="pill" data-color="yellow"><span class="dot"></span>Side by Side</span>
  <span class="pill" data-color="blue"><span class="dot"></span><span id="blueLabel">Hide Device B</span></span>
</div>
<div id="hint">L / Space cycles layouts — or use the colored remote buttons</div>

<script type="module" src="/js/receiver.js"></script>
</body>
</html>
