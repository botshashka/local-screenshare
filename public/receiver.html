<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screenshare Receiver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }

  /* ── Layout container ── */
  #stage {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .slot {
    position: absolute;
    background: #111;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .slot video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* ── Waiting overlay ── */
  .slot .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #555;
    font-size: 1rem;
    pointer-events: none;
  }
  .slot .overlay .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
  }
  .slot.connected .overlay { display: none; }
  .slot.disconnected .overlay { display: flex; }

  /* ── Layout: side-by-side ── */
  body.side-by-side #slotA { top: 0; left: 0; width: 50%; height: 100%; border-right: 2px solid #000; }
  body.side-by-side #slotB { top: 0; left: 50%; width: 50%; height: 100%; }

  /* ── Layout: pip-a (A big, B small) ── */
  body.pip-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.pip-a #slotB { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }

  /* ── Layout: pip-b (B big, A small) ── */
  body.pip-b #slotA { bottom: 24px; right: 24px; width: 28%; height: 28%; top: auto; left: auto; border: 2px solid #333; border-radius: 8px; cursor: pointer; z-index: 10; }
  body.pip-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Layout: solo-a ── */
  body.solo-a #slotA { top: 0; left: 0; width: 100%; height: 100%; }
  body.solo-a #slotB { display: none; }

  /* ── Layout: solo-b ── */
  body.solo-b #slotA { display: none; }
  body.solo-b #slotB { top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Controls bar ── */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    gap: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #controls:focus-within,
  body:not(.idle) #controls { opacity: 1; }

  #layoutBtn {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    outline: 2px solid transparent;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #layoutBtn:focus { outline-color: #60a5fa; }
  #layoutBtn:hover { background: rgba(255,255,255,0.2); }
  #layoutBtn .dots { display: flex; gap: 4px; align-items: center; }
  #layoutBtn .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.2s;
  }
  #layoutBtn .dots span.active { background: rgba(255,255,255,0.85); }

  /* ── Hint ── */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 200;
    white-space: nowrap;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>

<div id="stage">
  <div class="slot disconnected" id="slotA">
    <video id="videoA" autoplay playsinline></video>
    <div class="overlay">
      <div class="dot"></div>
      <span>Waiting for Mac A…</span>
    </div>
  </div>
  <div class="slot disconnected" id="slotB">
    <video id="videoB" autoplay playsinline></video>
    <div class="overlay">
      <div class="dot"></div>
      <span>Waiting for Mac B…</span>
    </div>
  </div>
</div>

<div id="controls">
  <button id="layoutBtn" autofocus>
    <span id="layoutLabel">Side by Side</span>
    <span class="dots" id="layoutDots"></span>
  </button>
</div>
<div id="hint">Press L or Space to switch layout</div>

<script>
const STUN = { iceServers: [] };

function tweakSdp(sdp) {
  const vp9Pts = [...sdp.matchAll(/a=rtpmap:(\d+) VP9\/90000/gi)].map(m => m[1]);
  if (vp9Pts.length) {
    sdp = sdp.replace(/^(m=video \S+ \S+ )([^\r\n]+)/m, (_, header, ptList) => {
      const pts = ptList.trim().split(' ');
      const reordered = [...vp9Pts, ...pts.filter(p => !vp9Pts.includes(p))];
      return `${header}${reordered.join(' ')}`;
    });
  }
  const opusMatch = sdp.match(/a=rtpmap:(\d+) opus\/48000/);
  if (opusMatch) {
    const pt = opusMatch[1];
    const fmtp = `a=fmtp:${pt} minptime=10;useinbandfec=1;stereo=1;sprop-stereo=1;maxaveragebitrate=510000;dtx=0`;
    sdp = sdp.replace(new RegExp(`a=fmtp:${pt} [^\r\n]*`), fmtp);
  }
  return sdp;
}
const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;

const LAYOUTS = [
  { cls: 'side-by-side', label: 'Side by Side' },
  { cls: 'pip-a',        label: 'Mac A Focus' },
  { cls: 'pip-b',        label: 'Mac B Focus' },
  { cls: 'solo-a',       label: 'Mac A Only' },
  { cls: 'solo-b',       label: 'Mac B Only' },
];
let layoutIdx = Math.max(0, LAYOUTS.findIndex(l => l.cls === localStorage.getItem('layout')));

const layoutBtn = document.getElementById('layoutBtn');
const layoutLabel = document.getElementById('layoutLabel');
const layoutDots = document.getElementById('layoutDots');
const hint = document.getElementById('hint');

// Build dots
LAYOUTS.forEach(() => { const s = document.createElement('span'); layoutDots.appendChild(s); });
function updateLayoutUI() {
  layoutLabel.textContent = LAYOUTS[layoutIdx].label;
  layoutDots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('active', i === layoutIdx));
}
updateLayoutUI();

const slots = { 'mac-a': document.getElementById('slotA'), 'mac-b': document.getElementById('slotB') };
const videos = { 'mac-a': document.getElementById('videoA'), 'mac-b': document.getElementById('videoB') };

// Peer connections
const pcs = {};

document.body.classList.add(LAYOUTS[layoutIdx].cls);

const RES_HINTS = {
  'side-by-side': { 'mac-a': 'side', 'mac-b': 'side' },
  'pip-a':        { 'mac-a': 'full', 'mac-b': 'pip'  },
  'pip-b':        { 'mac-a': 'pip',  'mac-b': 'full' },
  'solo-a':       { 'mac-a': 'full', 'mac-b': 'pip'  },
  'solo-b':       { 'mac-a': 'pip',  'mac-b': 'full' },
};

function sendResHints(onlyFor) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const hints = RES_HINTS[LAYOUTS[layoutIdx].cls] || { 'mac-a': 'full', 'mac-b': 'full' };
  for (const [to, hintVal] of Object.entries(hints)) {
    if (onlyFor && to !== onlyFor) continue;
    ws.send(JSON.stringify({ type: 'res-hint', to, from: 'receiver', hint: hintVal }));
  }
}

function cycleLayout() {
  document.body.classList.remove(LAYOUTS[layoutIdx].cls);
  layoutIdx = (layoutIdx + 1) % LAYOUTS.length;
  document.body.classList.add(LAYOUTS[layoutIdx].cls);
  localStorage.setItem('layout', LAYOUTS[layoutIdx].cls);
  updateLayoutUI();
  sendResHints();
}

layoutBtn.addEventListener('click', cycleLayout);

document.addEventListener('keydown', (e) => {
  if (e.key === 'l' || e.key === 'L' || e.key === ' ' || e.key === 'ColorF3Blue') {
    e.preventDefault();
    cycleLayout();
  }
});

// Click PiP slot to swap focus
document.getElementById('slotB').addEventListener('click', () => {
  if (LAYOUTS[layoutIdx].cls === 'pip-a') { cycleLayout(); } // pip-a → pip-b
});
document.getElementById('slotA').addEventListener('click', () => {
  if (LAYOUTS[layoutIdx].cls === 'pip-b') {
    document.body.classList.remove(LAYOUTS[layoutIdx].cls);
    layoutIdx = LAYOUTS.findIndex(l => l.cls === 'pip-a');
    document.body.classList.add(LAYOUTS[layoutIdx].cls);
    localStorage.setItem('layout', LAYOUTS[layoutIdx].cls);
    updateLayoutUI();
  }
});

// Show controls on mouse move / remote nav, hide after idle
let idleTimer;
function showControls() {
  document.body.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => document.body.classList.add('idle'), 4000);
}
document.addEventListener('mousemove', showControls);
document.addEventListener('keydown', showControls);
showControls();

// Show hint briefly on load
setTimeout(() => { hint.classList.add('show'); setTimeout(() => hint.classList.remove('show'), 3500); }, 800);

// ── WebRTC ──

function createPC(senderId) {
  if (pcs[senderId]) pcs[senderId].close();

  const pc = new RTCPeerConnection(STUN);
  pcs[senderId] = pc;

  pc.ontrack = (e) => {
    const video = videos[senderId];
    if (!video.srcObject) video.srcObject = new MediaStream();
    video.srcObject.addTrack(e.track);
    // Unmute on first real track (browser autoplay policy satisfied by user interaction on layout button)
    video.muted = false;
    slots[senderId].classList.remove('disconnected');
    slots[senderId].classList.add('connected');
  };

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) ws.send(JSON.stringify({ type: 'ice-candidate', to: senderId, from: 'receiver', candidate }));
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      // Minimize jitter buffer delay (Chrome 117+)
      pc.getReceivers().forEach(r => {
        if ('jitterBufferTarget' in r) r.jitterBufferTarget = 50;
      });
    }
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      slots[senderId].classList.remove('connected');
      slots[senderId].classList.add('disconnected');
      videos[senderId].srcObject = null;
      // Ask the sender to re-offer
      setTimeout(() => {
        if (ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'request-reoffers', to: senderId }));
      }, 2000);
    }
  };

  return pc;
}

// ── Signaling ──

let ws;

function connectWS() {
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'register', id: 'receiver' }));
  };

  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'sender-connected') {
      const pc = createPC(msg.id);
      // Add recvonly transceivers so we're ready for the offer
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });
      sendResHints(msg.id);
    }

    if (msg.type === 'offer') {
      const senderId = msg.from;
      let pc = pcs[senderId];
      if (!pc) pc = createPC(senderId);

      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: 'answer', to: senderId, from: 'receiver', sdp: tweakSdp(answer.sdp) }));
    }

    if (msg.type === 'ice-candidate' && msg.candidate) {
      const pc = pcs[msg.from];
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    if (msg.type === 'peer-disconnected') {
      const id = msg.id;
      slots[id]?.classList.remove('connected');
      slots[id]?.classList.add('disconnected');
      if (videos[id]) videos[id].srcObject = null;
      pcs[id]?.close();
      delete pcs[id];
    }
  };

  ws.onclose = () => setTimeout(connectWS, 3000);
}

connectWS();
</script>
</body>
</html>
