<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screenshare Sender</title>
<link id="favicon" rel="icon">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f0f0f;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; }
  .id-badge {
    background: #1e40af;
    color: #fff;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .status {
    font-size: 0.9rem;
    color: #888;
    min-height: 1.2em;
    text-align: center;
  }
  .status.connected { color: #4ade80; }
  .status.error { color: #f87171; }
  .picker { display: flex; gap: 16px; }
  button {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #374151; color: #6b7280; cursor: default; }
  video {
    width: 100%;
    max-width: 560px;
    border-radius: 10px;
    background: #111;
    aspect-ratio: 16/9;
    display: none;
  }
  video.visible { display: block; }
</style>
</head>
<body>

<h1>Screenshare Sender</h1>

<div id="pickerScreen">
  <div class="picker">
    <button id="btnA">I'm Device A</button>
    <button id="btnB">I'm Device B</button>
  </div>
</div>

<div id="mainScreen" style="display:none;flex-direction:column;align-items:center;gap:24px;">
  <span class="id-badge" id="idBadge">—</span>
  <div class="status" id="status">Connecting to server…</div>
  <button id="shareBtn" disabled>Share Screen</button>
  <video id="preview" muted autoplay playsinline></video>
</div>

<script type="module" src="/js/sender.js"></script>
</body>
</html>
